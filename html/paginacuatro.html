<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cuatro</title>
</head>
<body>
    <style>
body{
    background-color: black;
    position: relative;
    height: 100vh;
    margin: 0;
}
#main-word {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    color: white;
    font-size: 36px;
    font-weight: bold;
    z-index: 1;
}
.word {
    position: absolute;
    display: none;
    color: white;
    font-size: 24px;
    font-weight: bold;
    z-index: 0;
}
.top { top: 20%; left: 50%; transform: translateX(-50%); }
.bottom { bottom: 20%; left: 50%; transform: translateX(-50%); }
.left { top: 50%; left: 20%; transform: translateY(-50%); }
.right { top: 50%; right: 20%; transform: translateY(-50%); }
.top-left { top: 30%; left: 30%; }
    </style>
    
    <div id="main-word">“¿Qué queda cuando ya no está?”</div>
    
    <div class="word" style="top: 15%; left: 15%;" data-link="paginacinco.html">Experiencias</div>
    <div class="word" style="top: 25%; right: 10%;" data-link="paginacinco.html">Identidad</div>
    <div class="word" style="top: 40%; left: 25%;" data-link="paginacinco.html">Huella</div>
    <div class="word" style="top: 55%; right: 25%;" data-link="paginacinco.html">Memoria</div>
    <div class="word" style="top: 70%; left: 10%;" data-link="paginacinco.html">Recuerdos</div>
    <div class="word" style="top: 80%; right: 15%;" data-link="paginacinco.html">Vivencias</div>
    <div class="word" style="top: 10%; right: 40%;" data-link="paginacinco.html">Rastro</div>
    
    <script>
        document.getElementById('main-word').addEventListener('click', function() {
            document.querySelectorAll('.word').forEach(function(el) {
                el.style.display = 'block';
            });
        });

        document.querySelectorAll('.word').forEach(function(el) {
            el.addEventListener('click', function() {
                var target = this.getAttribute('data-link');
                if (target) {
                    window.location.href = target;
                }
            });
        });
    </script>
    
</body>
</html>
